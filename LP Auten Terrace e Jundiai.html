document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"aad222ca-aa45-4d8b-b287-f4f123254010\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9fce9baf-24f6-48fb-af85-b44b48589354\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a7ebe012-e333-492d-8a1f-a37fc18a21c2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"60383e15-5782-4833-9ead-67914e20b77f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* ============================================================\n   AUTEN · COLOR TOKENS\n   Palette derived from the Auten rebrand brandbook (Atsuki).\n   Four signatures: Impacto (terracotta), Elegância (slate),\n   Autêntico (greige), Exclusividade (mist).\n   ============================================================ */\n:root {\n  /* —— Base palette ————————————————————————————— */\n  /* Impacto · terracotta / cobre — the single brand accent */\n  --auten-terracotta:        #B15732;\n  --auten-terracotta-deep:   #8C411F;  /* pressed / on-light emphasis */\n  --auten-terracotta-soft:   #C67C5B;  /* hover / lift */\n  --auten-terracotta-tint:   #E8D8CF;  /* washes, subtle fills */\n\n  /* Elegância · slate / grafite — the dark neutral */\n  --auten-slate:             #3D3D47;\n  --auten-graphite:          #33333B;  /* dark surface background */\n  --auten-ink:               #26262C;  /* near-black, deepest */\n\n  /* Autêntico · greige — warm mid neutral */\n  --auten-greige:            #B0ABB0;\n  --auten-greige-deep:       #908B90;\n\n  /* Exclusividade · mist — cool light neutral */\n  --auten-mist:              #D2D2D2;\n\n  /* Warm light surfaces */\n  --auten-bone:              #ECEAE6;  /* primary light background */\n  --auten-paper:            #F5F3F0;  /* lightest, card surfaces */\n  --auten-white:             #FFFFFF;\n\n  /* —— Semantic aliases ————————————————————————— */\n  /* Surfaces */\n  --surface-page:            var(--auten-bone);\n  --surface-card:            var(--auten-paper);\n  --surface-raised:          var(--auten-white);\n  --surface-dark:            var(--auten-graphite);\n  --surface-dark-deep:       var(--auten-ink);\n  --surface-inverse:         var(--auten-slate);\n\n  /* Text */\n  --text-strong:             var(--auten-ink);      /* headings on light */\n  --text-body:               #45454E;               /* body on light */\n  --text-muted:              #6E6E77;               /* secondary on light */\n  --text-faint:              #9A969C;               /* captions, meta */\n  --text-on-dark:            var(--auten-paper);     /* body on dark */\n  --text-on-dark-muted:      #B9B6BC;               /* secondary on dark */\n  --text-accent:             var(--auten-terracotta);\n\n  /* Lines & borders */\n  --line-hairline:           rgba(38, 38, 44, 0.12);\n  --line-soft:               rgba(38, 38, 44, 0.18);\n  --line-strong:             rgba(38, 38, 44, 0.32);\n  --line-on-dark:            rgba(245, 243, 240, 0.16);\n  --line-accent:             var(--auten-terracotta);\n\n  /* Interactive */\n  --accent:                  var(--auten-terracotta);\n  --accent-hover:            var(--auten-terracotta-soft);\n  --accent-press:            var(--auten-terracotta-deep);\n  --accent-contrast:         var(--auten-paper);\n\n  /* Status (kept quiet, tuned to the warm palette) */\n  --status-positive:         #5C7A56;\n  --status-warning:          #B98A36;\n  --status-critical:         #A6432F;\n  --status-info:             var(--auten-slate);\n\n  /* Focus */\n  --focus-ring:              rgba(177, 87, 50, 0.45);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   AUTEN · TYPOGRAPHY TOKENS\n   Two voices:\n   · Essonnes (→ Playfair Display) — serif display for titles,\n     headlines and editorial italics. High contrast, elegant.\n   · Gantari — sans for body, UI, labels and letterspaced eyebrows.\n   ============================================================ */\n:root {\n  /* —— Families ————————————————————————————————— */\n  --font-display: 'Playfair Display', 'Essonnes', Georgia, 'Times New Roman', serif;\n  --font-sans:    'Gantari', ui-sans-serif, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-mono:    ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;\n\n  /* —— Weights ——————————————————————————————————— */\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* —— Fluid display scale (serif) ——————————————— */\n  --type-display-xl: 400 clamp(3.5rem, 6vw, 6.5rem)/1.02 var(--font-display);\n  --type-display-l:  400 clamp(2.75rem, 4.4vw, 4.5rem)/1.06 var(--font-display);\n  --type-display-m:  400 clamp(2rem, 3vw, 3rem)/1.1 var(--font-display);\n  --type-display-s:  400 clamp(1.5rem, 2.1vw, 2.125rem)/1.18 var(--font-display);\n\n  /* —— Heading scale (sans) ——————————————————————— */\n  --type-heading-l:  600 1.625rem/1.25 var(--font-sans);\n  --type-heading-m:  600 1.25rem/1.3 var(--font-sans);\n  --type-heading-s:  600 1.0625rem/1.35 var(--font-sans);\n\n  /* —— Body scale (sans) ——————————————————————————— */\n  --type-body-l:     400 1.125rem/1.65 var(--font-sans);\n  --type-body-m:     400 1rem/1.6 var(--font-sans);\n  --type-body-s:     400 0.875rem/1.55 var(--font-sans);\n\n  /* —— Labels / eyebrows ——————————————————————————— */\n  --type-label:      500 0.8125rem/1.3 var(--font-sans);\n  --type-eyebrow:    500 0.75rem/1.4 var(--font-sans);\n  --type-caption:    400 0.75rem/1.45 var(--font-sans);\n\n  /* —— Letter-spacing ——————————————————————————————— */\n  --tracking-display: -0.01em;   /* tighten large serif */\n  --tracking-tight:  -0.005em;\n  --tracking-normal:  0em;\n  --tracking-wide:    0.08em;\n  --tracking-eyebrow: 0.22em;    /* letterspaced uppercase labels */\n  --tracking-mark:    0.32em;    /* AUTEN wordmark spacing */\n\n  /* —— Roles ——————————————————————————————————————— */\n  --font-eyebrow-transform: uppercase;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   AUTEN · SPACING & LAYOUT TOKENS\n   Calm, editorial rhythm with generous negative space.\n   Base unit: 4px.\n   ============================================================ */\n:root {\n  --space-0:   0;\n  --space-1:   0.25rem;  /*  4px */\n  --space-2:   0.5rem;   /*  8px */\n  --space-3:   0.75rem;  /* 12px */\n  --space-4:   1rem;     /* 16px */\n  --space-5:   1.5rem;   /* 24px */\n  --space-6:   2rem;     /* 32px */\n  --space-7:   3rem;     /* 48px */\n  --space-8:   4rem;     /* 64px */\n  --space-9:   6rem;     /* 96px */\n  --space-10:  8rem;     /* 128px */\n\n  /* Component padding rhythm */\n  --pad-tight:   var(--space-2) var(--space-3);\n  --pad-snug:    var(--space-3) var(--space-4);\n  --pad-comfy:   var(--space-5) var(--space-6);\n  --pad-section: var(--space-9) var(--space-7);\n\n  /* Layout */\n  --container-max: 1200px;\n  --container-wide: 1440px;\n  --gutter: var(--space-6);\n  --measure: 64ch;        /* ideal reading width */\n  --measure-narrow: 46ch;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   AUTEN · EFFECTS — radii, borders, shadows, motion\n   The brand is architectural and restrained: small radii,\n   hairline borders, soft low shadows. No glow, no heavy depth.\n   ============================================================ */\n:root {\n  /* —— Corner radii ——————————————————————————————— */\n  /* Architectural, mostly squared. Cards stay crisp. */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;    /* matches the monogram tile */\n  --radius-lg:   10px;\n  --radius-pill: 999px;\n  --radius-card: var(--radius-md);\n\n  /* —— Border widths ——————————————————————————————— */\n  --border-hairline: 1px;\n  --border-strong:   1.5px;\n  --border-accent:   2px;\n\n  /* —— Shadows — low, warm, diffuse ————————————————— */\n  --shadow-xs:  0 1px 2px rgba(38, 38, 44, 0.06);\n  --shadow-sm:  0 2px 6px rgba(38, 38, 44, 0.07);\n  --shadow-md:  0 10px 24px -12px rgba(38, 38, 44, 0.18);\n  --shadow-lg:  0 26px 60px -28px rgba(38, 38, 44, 0.30);\n  --shadow-focus: 0 0 0 3px var(--focus-ring);\n\n  /* Inner hairline used to lift cards on light surfaces */\n  --ring-card: inset 0 0 0 1px var(--line-hairline);\n\n  /* —— Motion ——————————————————————————————————————— */\n  /* Calm, confident easing. Fades and short translates; no bounce. */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1);  /* @kind other */\n  --ease-entrance: cubic-bezier(0.16, 0.84, 0.44, 1);  /* @kind other */\n  --ease-exit:     cubic-bezier(0.4, 0.0, 1, 1);       /* @kind other */\n  --dur-fast:   140ms;  /* @kind other */\n  --dur-base:   240ms;  /* @kind other */\n  --dur-slow:   420ms;  /* @kind other */\n\n  /* —— Overlays ————————————————————————————————————— */\n  --scrim-dark:  rgba(38, 38, 44, 0.55);\n  --scrim-image: linear-gradient(180deg, rgba(38,38,44,0) 35%, rgba(38,38,44,0.72) 100%);  /* @kind other */\n  --blur-panel:  saturate(120%) blur(14px);  /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   AUTEN · BASE — light resets + brand primitives\n   Kept minimal: foundations and a few reusable text utilities\n   (wordmark, eyebrow, rules) that recur across the brand.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font: var(--type-body-m);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n::selection { background: var(--auten-terracotta); color: var(--auten-paper); }\n\na { color: var(--text-accent); text-decoration: none; }\na:hover { color: var(--accent-press); }\n\n/* —— Brand text primitives ——————————————————————————— */\n\n/* AUTEN wordmark — geometric sans, wide tracking, uppercase */\n.auten-wordmark {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-mark);\n  text-transform: uppercase;\n  line-height: 1;\n  color: currentColor;\n}\n\n/* Letterspaced uppercase eyebrow / kicker */\n.auten-eyebrow {\n  font: var(--type-eyebrow);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--text-accent);\n}\n\n/* Serif display helpers */\n.auten-display {\n  font-family: var(--font-display);\n  font-weight: var(--weight-regular);\n  letter-spacing: var(--tracking-display);\n  color: var(--text-strong);\n}\n.auten-display em,\n.auten-italic {\n  font-style: italic;\n}\n\n/* Thin brand rule — a short hairline accent under eyebrows/titles */\n.auten-rule {\n  display: inline-block;\n  width: 48px;\n  height: 1px;\n  background: var(--auten-terracotta);\n  vertical-align: middle;\n}\n\n/* Reduced motion */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.001ms !important;\n    transition-duration: 0.001ms !important;\n  }\n}\n<\u002Fstyle>\ font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"60383e15-5782-4833-9ead-67914e20b77f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"aad222ca-aa45-4d8b-b287-f4f123254010\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9fce9baf-24f6-48fb-af85-b44b48589354\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a7ebe012-e333-492d-8a1f-a37fc18a21c2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"60383e15-5782-4833-9ead-67914e20b77f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"aad222ca-aa45-4d8b-b287-f4f123254010\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9fce9baf-24f6-48fb-af85-b44b48589354\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a7ebe012-e333-492d-8a1f-a37fc18a21c2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"60383e15-5782-4833-9ead-67914e20b77f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   AUTEN · COLOR TOKENS\n   Palette derived from the Auten rebrand brandbook (Atsuki).\n   Four signatures: Impacto (terracotta), Elegância (slate),\n   Autêntico (greige), Exclusividade (mist).\n   ============================================================ */\n:root {\n  /* —— Base palette ————————————————————————————— */\n  /* Impacto · terracotta / cobre — the single brand accent */\n  --auten-terracotta:        #B15732;\n  --auten-terracotta-deep:   #8C411F;  /* pressed / on-light emphasis */\n  --auten-terracotta-soft:   #C67C5B;  /* hover / lift */\n  --auten-terracotta-tint:   #E8D8CF;  /* washes, subtle fills */\n\n  /* Elegância · slate / grafite — the dark neutral */\n  --auten-slate:             #3D3D47;\n  --auten-graphite:          #33333B;  /* dark surface background */\n  --auten-ink:               #26262C;  /* near-black, deepest */\n\n  /* Autêntico · greige — warm mid neutral */\n  --auten-greige:            #B0ABB0;\n  --auten-greige-deep:       #908B90;\n\n  /* Exclusividade · mist — cool light neutral */\n  --auten-mist:              #D2D2D2;\n\n  /* Warm light surfaces */\n  --auten-bone:              #ECEAE6;  /* primary light background */\n  --auten-paper:            #F5F3F0;  /* lightest, card surfaces */\n  --auten-white:             #FFFFFF;\n\n  /* —— Semantic aliases ————————————————————————— */\n  /* Surfaces */\n  --surface-page:            var(--auten-bone);\n  --surface-card:            var(--auten-paper);\n  --surface-raised:          var(--auten-white);\n  --surface-dark:            var(--auten-graphite);\n  --surface-dark-deep:       var(--auten-ink);\n  --surface-inverse:         var(--auten-slate);\n\n  /* Text */\n  --text-strong:             var(--auten-ink);      /* headings on light */\n  --text-body:               #45454E;               /* body on light */\n  --text-muted:              #6E6E77;               /* secondary on light */\n  --text-faint:              #9A969C;               /* captions, meta */\n  --text-on-dark:            var(--auten-paper);     /* body on dark */\n  --text-on-dark-muted:      #B9B6BC;               /* secondary on dark */\n  --text-accent:             var(--auten-terracotta);\n\n  /* Lines & borders */\n  --line-hairline:           rgba(38, 38, 44, 0.12);\n  --line-soft:               rgba(38, 38, 44, 0.18);\n  --line-strong:             rgba(38, 38, 44, 0.32);\n  --line-on-dark:            rgba(245, 243, 240, 0.16);\n  --line-accent:             var(--auten-terracotta);\n\n  /* Interactive */\n  --accent:                  var(--auten-terracotta);\n  --accent-hover:            var(--auten-terracotta-soft);\n  --accent-press:            var(--auten-terracotta-deep);\n  --accent-contrast:         var(--auten-paper);\n\n  /* Status (kept quiet, tuned to the warm palette) */\n  --status-positive:         #5C7A56;\n  --status-warning:          #B98A36;\n  --status-critical:         #A6432F;\n  --status-info:             var(--auten-slate);\n\n  /* Focus */\n  --focus-ring:              rgba(177, 87, 50, 0.45);\n}\n\n/* ============================================================\n   AUTEN · TYPOGRAPHY TOKENS\n   Two voices:\n   · Essonnes (→ Playfair Display) — serif display for titles,\n     headlines and editorial italics. High contrast, elegant.\n   · Gantari — sans for body, UI, labels and letterspaced eyebrows.\n   ============================================================ */\n:root {\n  /* —— Families ————————————————————————————————— */\n  --font-display: 'Playfair Display', 'Essonnes', Georgia, 'Times New Roman', serif;\n  --font-sans:    'Gantari', ui-sans-serif, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-mono:    ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;\n\n  /* —— Weights ——————————————————————————————————— */\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* —— Fluid display scale (serif) ——————————————— */\n  --type-display-xl: 400 clamp(3.5rem, 6vw, 6.5rem)/1.02 var(--font-display);\n  --type-display-l:  400 clamp(2.75rem, 4.4vw, 4.5rem)/1.06 var(--font-display);\n  --type-display-m:  400 clamp(2rem, 3vw, 3rem)/1.1 var(--font-display);\n  --type-display-s:  400 clamp(1.5rem, 2.1vw, 2.125rem)/1.18 var(--font-display);\n\n  /* —— Heading scale (sans) ——————————————————————— */\n  --type-heading-l:  600 1.625rem/1.25 var(--font-sans);\n  --type-heading-m:  600 1.25rem/1.3 var(--font-sans);\n  --type-heading-s:  600 1.0625rem/1.35 var(--font-sans);\n\n  /* —— Body scale (sans) ——————————————————————————— */\n  --type-body-l:     400 1.125rem/1.65 var(--font-sans);\n  --type-body-m:     400 1rem/1.6 var(--font-sans);\n  --type-body-s:     400 0.875rem/1.55 var(--font-sans);\n\n  /* —— Labels / eyebrows ——————————————————————————— */\n  --type-label:      500 0.8125rem/1.3 var(--font-sans);\n  --type-eyebrow:    500 0.75rem/1.4 var(--font-sans);\n  --type-caption:    400 0.75rem/1.45 var(--font-sans);\n\n  /* —— Letter-spacing ——————————————————————————————— */\n  --tracking-display: -0.01em;   /* tighten large serif */\n  --tracking-tight:  -0.005em;\n  --tracking-normal:  0em;\n  --tracking-wide:    0.08em;\n  --tracking-eyebrow: 0.22em;    /* letterspaced uppercase labels */\n  --tracking-mark:    0.32em;    /* AUTEN wordmark spacing */\n\n  /* —— Roles ——————————————————————————————————————— */\n  --font-eyebrow-transform: uppercase;\n}\n\n/* ============================================================\n   AUTEN · SPACING & LAYOUT TOKENS\n   Calm, editorial rhythm with generous negative space.\n   Base unit: 4px.\n   ============================================================ */\n:root {\n  --space-0:   0;\n  --space-1:   0.25rem;  /*  4px */\n  --space-2:   0.5rem;   /*  8px */\n  --space-3:   0.75rem;  /* 12px */\n  --space-4:   1rem;     /* 16px */\n  --space-5:   1.5rem;   /* 24px */\n  --space-6:   2rem;     /* 32px */\n  --space-7:   3rem;     /* 48px */\n  --space-8:   4rem;     /* 64px */\n  --space-9:   6rem;     /* 96px */\n  --space-10:  8rem;     /* 128px */\n\n  /* Component padding rhythm */\n  --pad-tight:   var(--space-2) var(--space-3);\n  --pad-snug:    var(--space-3) var(--space-4);\n  --pad-comfy:   var(--space-5) var(--space-6);\n  --pad-section: var(--space-9) var(--space-7);\n\n  /* Layout */\n  --container-max: 1200px;\n  --container-wide: 1440px;\n  --gutter: var(--space-6);\n  --measure: 64ch;        /* ideal reading width */\n  --measure-narrow: 46ch;\n}\n\n/* ============================================================\n   AUTEN · EFFECTS — radii, borders, shadows, motion\n   The brand is architectural and restrained: small radii,\n   hairline borders, soft low shadows. No glow, no heavy depth.\n   ============================================================ */\n:root {\n  /* —— Corner radii ——————————————————————————————— */\n  /* Architectural, mostly squared. Cards stay crisp. */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;    /* matches the monogram tile */\n  --radius-lg:   10px;\n  --radius-pill: 999px;\n  --radius-card: var(--radius-md);\n\n  /* —— Border widths ——————————————————————————————— */\n  --border-hairline: 1px;\n  --border-strong:   1.5px;\n  --border-accent:   2px;\n\n  /* —— Shadows — low, warm, diffuse ————————————————— */\n  --shadow-xs:  0 1px 2px rgba(38, 38, 44, 0.06);\n  --shadow-sm:  0 2px 6px rgba(38, 38, 44, 0.07);\n  --shadow-md:  0 10px 24px -12px rgba(38, 38, 44, 0.18);\n  --shadow-lg:  0 26px 60px -28px rgba(38, 38, 44, 0.30);\n  --shadow-focus: 0 0 0 3px var(--focus-ring);\n\n  /* Inner hairline used to lift cards on light surfaces */\n  --ring-card: inset 0 0 0 1px var(--line-hairline);\n\n  /* —— Motion ——————————————————————————————————————— */\n  /* Calm, confident easing. Fades and short translates; no bounce. */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1);  /* @kind other */\n  --ease-entrance: cubic-bezier(0.16, 0.84, 0.44, 1);  /* @kind other */\n  --ease-exit:     cubic-bezier(0.4, 0.0, 1, 1);       /* @kind other */\n  --dur-fast:   140ms;  /* @kind other */\n  --dur-base:   240ms;  /* @kind other */\n  --dur-slow:   420ms;  /* @kind other */\n\n  /* —— Overlays ————————————————————————————————————— */\n  --scrim-dark:  rgba(38, 38, 44, 0.55);\n  --scrim-image: linear-gradient(180deg, rgba(38,38,44,0) 35%, rgba(38,38,44,0.72) 100%);  /* @kind other */\n  --blur-panel:  saturate(120%) blur(14px);  /* @kind other */\n}\n\n/* ============================================================\n   AUTEN · BASE — light resets + brand primitives\n   Kept minimal: foundations and a few reusable text utilities\n   (wordmark, eyebrow, rules) that recur across the brand.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font: var(--type-body-m);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n::selection { background: var(--auten-terracotta); color: var(--auten-paper); }\n\na { color: var(--text-accent); text-decoration: none; }\na:hover { color: var(--accent-press); }\n\n/* —— Brand text primitives ——————————————————————————— */\n\n/* AUTEN wordmark — geometric sans, wide tracking, uppercase */\n.auten-wordmark {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-mark);\n  text-transform: uppercase;\n  line-height: 1;\n  color: currentColor;\n}\n\n/* Letterspaced uppercase eyebrow / kicker */\n.auten-eyebrow {\n  font: var(--type-eyebrow);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--text-accent);\n}\n\n/* Serif display helpers */\n.auten-display {\n  font-family: var(--font-display);\n  font-weight: var(--weight-regular);\n  letter-spacing: var(--tracking-display);\n  color: var(--text-strong);\n}\n.auten-display em,\n.auten-italic {\n  font-style: italic;\n}\n\n/* Thin brand rule — a short hairline accent under eyebrows/titles */\n.auten-rule {\n  display: inline-block;\n  width: 48px;\n  height: 1px;\n  background: var(--auten-terracotta);\n  vertical-align: middle;\n}\n\n/* Reduced motion */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.001ms !important;\n    transition-duration: 0.001ms !important;\n  }\n}\n\n<\u002Fstyle>\n<script src=\"f8ed45da-7b76-4aa8-a2e5-aee117548617\"><\u002Fscript>\n<style>\n  html { scroll-behavior: smooth; }\n  /* html/body NÃO podem ter overflow hidden/clip nem flex-centering — isso quebra o scroll/âncoras. */\n  html, body { margin: 0; padding: 0; height: auto; min-height: 100%; display: block; }\n  *, *::before, *::after { box-sizing: border-box; }\n  #cin img { display: block; }\n  /* proteção de overflow horizontal fica no wrapper interno, nunca no html/body */\n  #cin { font-feature-settings: \"liga\" 1, \"kern\" 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow-x: clip; }\n  #cin section[id], #cin div[id] { scroll-margin-top: 0; }\n  #cin #contato { scroll-margin-top: 88px; }\n  ::selection { background: #B15732; color: #F5F3F0; }\n  #cin .cin-scroll { scrollbar-width: thin; }\n  #cin .cin-scroll::-webkit-scrollbar { height: 6px; }\n  #cin .cin-scroll::-webkit-scrollbar-thumb { background: rgba(245,243,240,0.2); border-radius: 8px; }\n  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }\n\n  @keyframes cinBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }\n  #cin .cin-nav:hover { opacity: 1 !important; }\n  #cin .cin-link:hover { color: var(--auten-white); }\n  #cin .cin-foot:hover { color: var(--auten-paper); }\n  #cin .cin-split:hover .cin-split-img { transform: scale(1.05); }\n  #cin .cin-cta:hover { border-color: var(--auten-terracotta-soft) !important; color: #fff !important; background: var(--auten-terracotta-soft); box-shadow: 0 0 0 1px rgba(177,87,50,0.45), 0 10px 32px -8px rgba(177,87,50,0.6); }\n  #cin #cin-header img { transition: transform .5s cubic-bezier(.16,1,.3,1); transform-origin: left center; }\n  #cin .cin-plan { transition: transform .35s cubic-bezier(.25,.46,.45,.94), box-shadow .35s cubic-bezier(.25,.46,.45,.94), border-color .35s; }\n  #cin .cin-plan:hover { transform: translateY(-4px); box-shadow: 0 22px 60px -24px rgba(0,0,0,0.7); border-color: rgba(177,87,50,0.4); }\n  #cin .cin-plan-img img { transition: transform .5s cubic-bezi 8) saturate(0.95); }\n  #cin .cin-plan-img img, #cin iframe { filter: none; }\n  #cin section[style*=\"100vh\"]::after { content: \"\"; position: absolute; inset: 0; z-index: 1; pointer-events: none; box-shadow: inset 0 0 200px 16px rgba(0,0,0,0.42), inset 0 -120px 160px -40px rgba(0,0,0,0.36); }\n  #cin section[style*=\"100vh\"]::before { content: \"\"; position: absolute; z-index: 1; pointer-events: none; inset: clamp(16px,2.4vw,34px); border: 1px solid rgba(245,243,240,0.16); }\n  #cin .cin-split::after { content: \"\"; position: absolute; z-index: 3; pointer-events: none; inset: clamp(14px,2vw,26px); border: 1px solid rgba(245,243,240,0.18); transition: inset .6s cubic-bezier(.25,.46,.45,.94); }\n  #cin .cin-split:hover::after { inset: clamp(10px,1.4vw,18px); }\n  #cin .cin-label { display: inline-flex; align-items: center; padding: 8px 15px; font-size: 0.64rem; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; border-radius: 2px; }\n  #cin .cin-spec { font-family: var(--font-sans); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; }\n  #cin .cin-word { display: inline-block; }\n  #cin .cin-stack-inner { width: 100%; max-width: 1320px; margin: 0 auto; padding: 0 clamp(20px,5vw,64px); }\n  #cin .cin-stack-card { max-width: 480px; padding: clamp(30px,3.4vw,44px); background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(245,243,240,0.14); border-radius: 4px; }\n  #cin .cin-stack-num { font-family: var(--font-sans); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--auten-terracotta-soft); margin-bottom: 18px; }\n  #cin .cin-stack-title { font-family: var(--font-display); font-weight: 400; color: var(--auten-white); font-size: clamp(1.7rem,3.2vw,2.7rem); line-height: 1; letter-spacing: -0.01em; margin: 0; }\n  #cin .cin-stack-body { font: var(--type-body-l); color: rgba(245,243,240,0.85); margin: 18px 0 0; }\n  #cin .cin-pill { font-family: ui-monospace, \"SFMono-Regular\", \"Menlo\", monospace; font-size: 0.72rem; letter-spacing: 0.06em; padding: 8px 14px; border-radius: 2px; background: rgba(0,0,0,0.25); backdrop-filter: blur(4px); }\n  #cin .cin-pill--terra { color: var(--auten-terracotta-soft); border: 1px solid rgba(177,87,50,0.55); }\n  #cin .cin-pill--champ { color: #D8C29A; border: 1px solid rgba(201,169,110,0.55); }\n  #cin .cin-input { width: 100%; box-sizing: border-box; background: transparent; border: none; border-bottom: 1px solid rgba(245,243,240,0.3); border-radius: 0; padding: 14px 2px; font-family: var(--font-sans); font-size: 1rem; color: var(--auten-white); transition: border-color .4s cubic-bezier(.25,.46,.45,.94); }\n  #cin .cin-input::placeholder { color: rgba(245,243,240,0.45); }\n  #cin .cin-input:focus { outline: none; border-bottom-color: var(--auten-terracotta-soft); }\n  #cin .cin-select { appearance: none; -webkit-appearance: none; background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23F5F3F0' stroke-width='1.6'><path d='M6 9l6 6 6-6'/><\u002Fsvg>\"); background-repeat: no-repeat; background-position: right 2px center; cursor: pointer; }\n  #cin .cin-select option { background: #1a1a24; color: var(--auten-white); }\n  #cin .cin-check { appearance: none; -webkit-appearance: none; flex-shrink: 0; width: 18px; height: 18px; margin-top: 1px; border: 1px solid rgba(245,243,240,0.4); border-radius: 2px; background: transparent; cursor: pointer; position: relative; transition: background .25s, border-color .25s; }\n  #cin .cin-check:checked { background: var(--auten-terracotta); border-color: var(--auten-terracotta); }\n  #cin .cin-check:checked::after { content: \"\"; position: absolute; left: 5px; top: 1px; width: 5px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }\n  #cin .cin-submit { width: 100%; padding: 18px; background: #B5522A; color: #F5F3F0; border: none; border-radius: 3px; font-family: var(--font-sans); font-weight: 600; font-size: 0.82rem; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background .4s cubic-bezier(.25,.46,.45,.94), box-shadow .4s cubic-bezier(.25,.46,.45,.94); }\n  #cin .cin-submit:hover { background: var(--auten-terracotta-soft); box-shadow: 0 0 0 1px rgba(177,87,50,0.5), 0 14px 44px -10px rgba(177,87,50,0.6); }\n\n  /* —— Cursor de luxo —— */\n  #cin-cursor { position: fixed; top: 0; left: 0; width: 40px; height: 40px; margin: -20px 0 0 -20px; border: 1px solid var(--auten-terracotta); border-radius: 999px; background: transparent; pointer-events: none; z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; transition: width .32s cubic-bezier(.16,1,.3,1), height .32s cubic-bezier(.16,1,.3,1), margin .32s cubic-bezier(.16,1,.3,1), background .3s, border-color .3s, opacity .3s; }\n  #cin-cursor.is-big { width: 80px; height: 80px; margin: -40px 0 0 -40px; background: rgba(177,87,50,0.20); border-color: rgba(177,87,50,0.55); }\n  #cin-cursor.is-ver { width: 80px; height: 80px; margin: -40px 0 0 -40px; background: rgba(177,87,50,0.9); border-color: rgba(177,87,50,0); }\n  #cin-cursor .cin-cursor-label { font-family: var(--font-sans); font-weight: 600; font-size: 0.62rem; letter-spacing: 0.22em; color: #F5F3F0; opacity: 0; transform: scale(.5); transition: opacity .25s, transform .25s; }\n  #cin-cursor.is-ver .cin-cursor-label { opacity: 1; transform: scale(1); }\n  @media (hover: none), (pointer: coarse) { #cin-cursor { display: none !important; } }\n\n  /* —— Menu mobile —— */\n  #cin-mobile { position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 96px 28px 48px; background: rgba(8,8,10,0.96); backdrop-filter: blur(22px) saturate(1.3); -webkit-backdrop-filter: blur(22px) saturate o 0; max-width: 38ch;\">Obrigado, {{ nomeCurto }}. Nosso time entrará em contato sobre {{ interesseLabel }} em breve.<\u002Fp>\n            <button onclick=\"{{ onReset }}\" style=\"margin-top: 24px; background: none; border: none; color: var(--auten-terracotta-soft); font-weight: 600; font-size: 0.8rem; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; cursor: pointer;\">Enviar outro interesse<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer data-screen-label=\"Rodapé\" style=\"background: var(--auten-ink); color: rgba(245,243,240,0.7); padding: clamp(56px,8vw,88px) clamp(20px,5vw,64px) 40px; border-top: 1px solid var(--line-on-dark);\">\n    <div style=\"max-width: 1320px; margin: 0 auto;\">\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 40px; align-items: start; padding-bottom: 44px; border-bottom: 1px solid var(--line-on-dark);\">\n        <div>\n          <img src=\"ff18bd6f-963f-4267-8b83-79c6a1b5a004\" alt=\"Auten Incorporadora\" style=\"height: 42px; width: auto; display: block;\">\n          <p style=\"font-family: var(--font-display); font-style: italic; font-size: 1.15rem; color: var(--auten-terracotta-soft); margin: 10px 0 0;\">Desafie o comum.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size: 0.72rem; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: rgba(245,243,240,0.45); margin-bottom: 14px;\">Empreendimentos<\u002Fdiv>\n          <div style=\"display: grid; gap: 8px; font-size: 0.92rem;\"><a href=\"javascript:void(0)\" data-target=\"terrace\" style=\"color: rgba(245,243,240,0.78); text-decoration: none;\" class=\"cin-foot\">Terrace Serra do Japi<\u002Fa><a href=\"javascript:void(0)\" data-target=\"jundiai\" style=\"color: rgba(245,243,240,0.78); text-decoration: none;\" class=\"cin-foot\">Auten Jundiaí<\ tsType&quot;:&quot;boolean&quot;},&quot;parallaxStrength&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;min&quot;:0.5,&quot;max&quot;:1.5,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;},&quot;meshEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;meshSpeed&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;min&quot;:0,&quot;max&quot;:2.5,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { nome: '', telefone: '', email: '', interesse: '', consent: false, submitted: false, error: '' };\n\n  renderVals() {\n    const val = (e) => (e && e.target ? e.target.value : e);\n    const nome = this.state.nome;\n    return {\n      nome,\n      telefone: this.state.telefone,\n      email: this.state.email,\n      interesse: this.state.interesse,\n      consent: this.state.consent,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      error: this.state.error,\n      nomeCurto: (nome || '').trim().split(' ')[0] || 'tudo bem',\n      interesseLabel: this.state.interesse || 'os empreendimentos',\n      interesseOptions: ['Terrace Serra do Japi', 'Auten Jundiaí', 'Os dois empreendimentos'],\n      onNome: (e) => this.setState({ nome: val(e), error: '' }),\n      onEmail: (e) => this.setState({ email: val(e), error: '' }),\n      onInteresse: (e) => this.setState({ interesse: val(e), error: '' }),\n      onConsent: (e) => this.setState({ consent: e && e.target ? e.target.checked : !!e, error: '' }),\n      onTel: (e) => {\n        const d = String(val(e) || '').replace(/\\D/g, '').slice(0, 11);\n        let out = d;\n        if (d.length > 7) out = `(${d.slice(0, 2)}) ${d.slice(2, 7)}-${d.slice(7)}`;\n        else if (d.length > 2) out = `(${d.slice(0, 2)}) ${d.slice(2)}`;\n        else if (d.length > 0) out = `(${d}`;\n        this.setState({ telefone: out, error: '' });\n      },\n      onSubmit: () => {\n        const { nome, telefone, email, interesse, consent } = this.state;\n        if (!nome.trim() || !telefone.trim() || !email.trim() || !interesse) {\n          this.setState({ error: 'Preencha nome, telefone, e-mail e o empreendimento de interesse.' });\n          return;\n        }\n        if (!/.+@.+\\..+/.test(email)) { this.setState({ error: 'Informe um e-mail válido.' }); return; }\n        if (!consent) { this.setState({ error: 'É necessário aceitar a Política de Privacidade.' }); return; }\n        this.setState({ submitted: true, error: '' });\n      },\n      onReset: () => this.setState({ nome: '', telefone: '', email: '', interesse: '', consent: false, submitted: false, error: '' }),\n    };\n  }\n\n  componentDidMount() {\n    const root = document.getElementById('cin');\n    if (!root) return;\n    const P = this.props || {};\n    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const EASE = 'cubic-bezier(.16,1,.3,1)';\n    const clamp = (v, a, b) => (v < a ? a : (v > b ? b : v));\n    const pStrength = clamp(typeof P.parallaxStrength === 'number' ? P.parallaxStrength : 1, 0.4, 1.6);\n\n    // ---- Mesh-gradient ao vivo (WebGL) atrás do manifesto ----\n    if (P.meshEnabled !== false) {\n      const canvas = root.querySelector('canvas[data-mesh]');\n      if (canvas) {\n        const gl = canvas.getContext('webgl', { antialias: true, premultipliedAlpha: false });\n        if (gl) {\n          const speed = clamp(typeof P.meshSpeed === 'number' ? P.meshSpeed : 1, 0, 3);\n          const vsrc = 'attribute vec2 p;varying vec2 vUv;void main(){vUv=p*0.5+0.5;gl_Position=vec4(p,0.0,1.0);}';\n          const fsrc = [\n            'precision highp float;',\n            'uniform float u_time;uniform vec2 u_res;varying vec2 vUv;',\n            'vec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}',\n            'float snoise(vec2 v){const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',\n            'vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);',\n            'vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);',\n            'vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod(i,289.0);',\n            'vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));',\n            'vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);m=m*m;m=m*m;',\n            'vec3 x=2.0*fract(p*C.www)-1.0;vec3 h=abs(x)-0.5;vec3 ox=floor(x+0.5);vec3 a0=x-ox;',\n            'm*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',\n            'vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.0*dot(m,g);}',\n            'float fbm(vec2 p){float s=0.0,a=0.5;for(int i=0;i<5;i++){s+=a*snoise(p);p*=2.0;a*=0.5;}return s;}',\n            'void main(){',\n            '  vec2 uv=vUv;vec2 pp=uv*vec2(u_res.x/u_res.y,1.0)*1.4;',\n            '  float t=u_time*0.05;',\n            '  vec2 q=vec2(fbm(pp+vec2(0.0,t)),fbm(pp+vec2(5.2,1.3-t)));',\n            '  vec2 r=vec2(fbm(pp+2.6*q+vec2(1.7,9.2)+0.15*t),fbm(pp+2.6*q+vec2(8.3,2.8)-0.12*t));',\n            '  float f=fbm(pp+2.6*r);',\n            '  vec3 ink=vec3(0.039,0.039,0.047);',\n            '  vec3 slate=vec3(0.149,0.149,0.180);',\n            '  vec3 terra=vec3(0.694,0.341,0.196);',\n            '  vec3 terraSoft=vec3(0.815,0.450,0.270);',\n            '  vec3 col=mix(ink,slate,clamp(f*0.55+0.5,0.0,1.0));',\n            '  col=mix(col,terra,clamp(length(r)*0.55,0.0,1.0)*0.55);',\n            '  col=mix(col,terraSoft,pow(clamp(f,0.0,1.0),3.0)*0.45);',\n            '  float vg=smoothstep(1.15,0.15,length(uv-0.5));',\n            '  col*=mix(0.62,1.0,vg);',\n            '  gl_FragColor=vec4(col,1.0);',\n            '}'\n          ].join('\\n');\n          const sh = (type, src) => { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; };\n          const prog = gl.createProgram();\n          gl.attachShader(prog, sh(gl.VERTEX_SHADER, vsrc));\n          gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fsrc));\n          gl.linkProgram(prog);\n          gl.useProgram(prog);\n          const buf = gl.createBuffer();\n          gl.bindBuffer(gl.ARRAY_BUFFER, buf);\n          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);\n          const loc = gl.getAttribLocation(prog, 'p');\n          gl.enableVertexAttribArray(loc);\n          gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);\n          const uTime = gl.getUniformLocation(prog, 'u_time');\n          const uRes = gl.getUniformLocation(prog, 'u_res');\n          const resize = () => {\n            const dpr = Math.min(window.devicePixelRatio || 1, 1.75);\n            const w = Math.max(1, Math.round(canvas.clientWidth * dpr));\n            const h = Math.max(1, Math.round(canvas.clientHeight * dpr));\n            if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; gl.viewport(0, 0, w, h); }\n            gl.uniform2f(uRes, w, h);\n          };\n          resize();\n          window.addEventListener('resize', resize, { passive: true });\n          let meshRaf = 0; const t0 = performance.now();\n          let meshVisible = true;\n          const mio = new IntersectionObserver((es) => { meshVisible = es[0].isIntersecting; }, { rootMargin: '120px' });\n          mio.observe(canvas);\n          const draw = (now) => {\n            if (meshVisible) {\n              resize();\n              gl.uniform1f(uTime, reduce ? 6.0 : ((now - t0) / 1000) * speed);\n              gl.drawArrays(gl.TRIANGLES, 0, 3);\n              if (reduce) { meshRaf = 0; return; }\n            }\n            meshRaf = requestAnimationFrame(draw);\n          };\n          meshRaf = requestAnimationFrame(draw);\n          this._meshCleanup = () => { cancelAnimationFrame(meshRaf); window.removeEventListener('resize', resize); mio.disconnect(); const ext = gl.getExtension('WEBGL_lose_context'); if (ext) ext.loseContext(); };\n        }\n      }\n    }\n\n    const header = document.getElementById('cin-header');\n    const logo = header ? header.querySelector('img') : null;\n    const hero = document.getElementById('topo');\n    const heroImg = root.querySelector('[data-hero-img]');\n    const heroVeil = root.querySelector('[data-hero-veil]');\n    const heroText = root.querySelector('[data-hero-text]');\n    const heroNext = hero ? hero.nextElementSibling : null;\n    const progressFill = root.querySelector('[data-progress-fill]');\n\n    const grainEl = root.querySelector('[data-grain]');\n    if (grainEl && P.grainEnabled === false) grainEl.style.display = 'none';\n\n    // ---- Menu mobile (hamburger -> overlay) ----\n    const burger = header ? header.querySelector('.cin-burger') : null;\n    if (burger) {\n      const items = [\n        { label: 'O padrão', target: 'padrao' },\n        { label: 'Terrace', target: 'terrace' },\n        { label: 'Jundiaí', target: 'jundiai' },\n      ];\n      const ov = document.createElement('div');\n      ov.id = 'cin-mobile';\n      const logoSrc = logo ? logo.getAttribute('src') : '';\n      ov.innerHTML =\n        (logoSrc ? '<img class=\"cin-m-mark\" src=\"' + logoSrc + '\" alt=\"Auten\">' : '') +\n        '<button type=\"button\" class=\"cin-m-close\" aria-label=\"Fechar menu\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>' +\n        items.map((it) => '<a class=\"cin-m-link\" href=\"javascript:void(0)\" data-target=\"' + it.target + '\">' + it.label + '<\u002Fa>').join('') +\n        '<a class=\"cin-m-cta\" href=\"javascript:void(0)\" data-target=\"contato\">Tenho interesse<\u002Fa>';\n      document.body.appendChild(ov);\n      this._mobile = ov;\n\n      const close = () => { ov.classList.remove('is-open'); burger.setAttribute('aria-expanded', 'false'); document.body.style.overflow = ''; };\n      const open = () => { ov.classList.add('is-open'); burger.setAttribute('aria-expanded', 'true'); document.body.style.overflow = 'hidden'; };\n      burger.addEventListener('click', open);\n      ov.querySelector('.cin-m-close').addEventListener('click', close);\n      ov.querySelectorAll('.cin-m-link, .cin-m-cta').forEach((a) => a.addEventListener('click', close));\n      const onKey = (e) => { if (e.key === 'Escape') close(); };\n      document.addEventListener('keydown', onKey);\n      this._mobileCleanup = () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; ov.remove(); };\n    }\n\n    // ---- Navegação: data-target + scrollIntoView (robusto com position:sticky) ----\n    const onNavClick = (e) => {\n      const link = e.target.closest('[data-target]');\n      if (!link) return;\n      e.preventDefault();\n      const id = link.dataset.target;\n      const el = document.getElementById(id);\n      if (!el) return;\n      el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    };\n    document.addEventListener('click', onNavClick);\n    this._navCleanup = () => document.removeEventListener('click', onNavClick);\n\n    // ---- Stacking: paint every block strictly in DOM order (overlap effect) ----\n    let z = 1;\n    Array.from(root.children).forEach((ch) => {\n      if (ch === header || ch.hasAttribute('data-progress') || ch.hasAttribute('data-grain')) return;\n      if (getComputedStyle(ch).position === 'static') ch.style.position = 'relative';\n      ch.style.zIndex = String(z++);\n    });\n\n    // ---- Scenes: fullscreen parallax photo sections ----\n    const scenes = [];\n    root.querySelectorAll('[data-scene]').forEach((sec) => {\n      const wrap = sec.querySelector('[data-parallax]');\n      if (!wrap) return;\n      if (!reduce) { wrap.style.inset = '-18% 0'; wrap.style.willChange = 'transform'; }\n      const veil = document.createElement('div');\n      veil.setAttribute('data-scene-veil', '');\n      veil.style.cssText = 'position:absolute;inset:0;z-index:1;background:#0a0a0a;pointer-events:none;will-change:opacity;opacity:' + (reduce ? '0.1' : '0.55') + ';';\n      wrap.parentNode.insertBefore(veil, wrap.nextSibling);\n      scenes.push({ sec, wrap, veil });\n    });\n\n    // ---- Generic parallax (non-scene backgrounds, e.g. storytelling) ----\n    const genericPx = Array.from(root.querySelectorAll('[data-parallax]'))\n      .filter((el) => !el.closest('[data-scene]'))\n      .map((el) => ({ el, f: parseFloat(el.dataset.parallax) || 0.1 }));\n\n    // ---- Cursor de luxo (apenas ponteiro fino) ----\n    const fine = window.matchMedia('(hover: hover) and (pointer: fine)').matches;\n    if (fine && P.cursorEnabled !== false) {\n      const cur = document.createElement('div');\n      cur.id = 'cin-cursor';\n      cur.innerHTML = '<span class=\"cin-cursor-label\">VER<\u002Fspan>';\n      document.body.appendChild(cur);\n      this._cursor = cur;\n      let cx = 0, cy = 0, tx = 0, ty = 0, craf = 0;\n      const loop = () => { cx += (tx - cx) * 0.18; cy += (ty - cy) * 0.18; cur.style.transform = 'translate3d(' + cx + 'px,' + cy + 'px,0)'; craf = requestAnimationFrame(loop); };\n      const move = (e) => { tx = e.clientX; ty = e.clientY; cur.style.opacity = '1'; };\n      const leave = () => { cur.style.opacity = '0'; };\n      const over = (e) => {\n        const t = e.target;\n        const cta = t.closest && t.closest('.cin-cta, .cin-submit, button, .cin-split, a.cin-link');\n        const big = t.closest && t.closest('img, .cin-plan, [data-mask], a[href^=\"http\"]');\n        cur.classList.toggle('is-ver', !!cta);\n        cur.classList.toggle('is-big', !cta && !!big);\n      };\n      window.addEventListener('mousemove', move, { passive: true });\n      window.addEventListener('mouseover', over, { passive: true });\n      document.addEventListener('mouseleave', leave);\n      craf = requestAnimationFrame(loop);\n      this._curCleanup = () => { cancelAnimationFrame(craf); window.removeEventListener('mousemove', move); window.removeEventListener('mouseover', over); document.removeEventListener('mouseleave', leave); cur.remove(); };\n    }\n\n    // ---- Continuous rAF engine: reads live positions via getBoundingClientRect ----\n    let rafId = 0;\n    const engine = () => {\n      const vh = window.innerHeight || 800;\n      const rRoot = root.getBoundingClientRect();\n      const scrolled = -rRoot.top;\n\n      // scroll progress line (terracota)\n      if (progressFill) {\n        const scrollable = rRoot.height - vh;\n        progressFill.style.transform = 'scaleY(' + (scrollable > 0 ? clamp(scrolled / scrollable, 0, 1) : 0).toFixed(4) + ')';\n      }\n\n      // navbar morph\n      if (header) {\n        if (scrolled > 60) {\n          header.style.background = 'rgba(10,10,10,0.72)';\n          header.style.backdropFilter = 'blur(20px) saturate(1.4)';\n          header.style.webkitBackdropFilter = 'blur(20px) saturate(1.4)';\n          header.style.borderBottom = '1px solid rgba(177,87,50,0.65)';\n          if (logo) logo.style.transform = 'scale(0.9)';\n        } else {\n          header.style.background = 'transparent';\n          header.style.backdropFilter = 'none';\n          header.style.webkitBackdropFilter = 'none';\n          header.style.borderBottom = '1px solid transparent';\n          if (logo) logo.style.transform = 'scale(1)';\n        }\n      }\n\n      if (!reduce) {\n        // hero sticky cinematográfico (driven by next section position)\n        if (heroNext) {\n          const nt = heroNext.getBoundingClientRect().top;\n          const hp = clamp((vh - nt) / vh, 0, 1);\n          if (heroImg) heroImg.style.transform = 'scale(' + (1 + 0.15 * hp).toFixed(4) + ')';\n          if (heroText) {\n            heroText.style.transform = 'translate3d(0,' + (-hp * 60).toFixed(1) + 'px,0)';\n            heroText.style.opacity = clamp(1 - hp * 1.25, 0, 1).toFixed(3);\n          }\n          if (heroVeil) heroVeil.style.opacity = (0.6 * hp).toFixed(3);\n        }\n\n        // generic parallax\n        for (const g of genericPx) {\n          const r = g.el.getBoundingClientRect();\n          const prog = (r.top + r.height / 2 - vh / 2) / vh;\n          g.el.style.transform = 'translate3d(0,' + (prog * g.f * 100 * pStrength).toFixed(1) + 'px,0)';\n        }\n\n        // scenes: deep parallax + scale 1.3->1.0 + overlay 0.55->0.1\n        for (const s of scenes) {\n          const r = s.sec.getBoundingClientRect();\n          let prog = (r.top + r.height / 2 - vh / 2) / (vh / 2);\n          prog = clamp(prog, -1, 1);\n          const ap = Math.abs(prog);\n          const scale = 1 + ap * 0.3 * pStrength;\n          const ty = -prog * 0.14 * r.height * pStrength;\n          s.wrap.style.transform = 'translate3d(0,' + ty.toFixed(1) + 'px,0) scale(' + scale.toFixed(4) + ')';\n          s.veil.style.opacity = clamp(0.1 + ap * 0.45, 0.1, 0.55).toFixed(3);\n        }\n      }\n\n      rafId = requestAnimationFrame(engine);\n    };\n    rafId = requestAnimationFrame(engine);\n    this._rafStop = () => cancelAnimationFrame(rafId);\n\n    // ---- One-shot reveals setup ----\n    const reveals = Array.from(root.querySelectorAll('[data-reveal]')).filter((el) => el.getAttribute('data-rise') !== 'zoom');\n    if (!reduce) {\n      for (const el of reveals) {\n        const rise = el.getAttribute('data-rise');\n        if (rise === 'x') { el.style.opacity = '0'; el.style.transform = 'translateX(-22px)'; el.style.transition = 'opacity .8s ' + EASE + ', transform .8s ' + EASE; }\n        else if (rise === 'scale') { el.style.opacity = '0'; el.style.transform = 'scale(1.04)'; el.style.transition = 'opacity 1s ' + EASE + ', transform 1.1s ' + EASE; }\n        else { el.style.opacity = '0'; el.style.transform = 'translateY(40px)'; el.style.transition = 'opacity 1s ' + EASE + ', transform 1.1s ' + EASE; }\n        const d = el.getAttribute('data-delay');\n        if (d) el.style.transitionDelay = d + 'ms';\n      }\n    }\n\n    // title clip-up (translateY 110% -> 0 inside overflow:hidden)\n    const clips = Array.from(root.querySelectorAll('[data-clip]'));\n    if (!reduce) {\n      for (const h of clips) {\n        h.style.overflow = 'hidden';\n        h.style.paddingBottom = '0.12em';\n        const inner = document.createElement('span');\n        inner.style.cssText = 'display:block;transform:translateY(110%);transition:transform .9s ' + EASE + ';will-change:transform;';\n        while (h.firstChild) inner.appendChild(h.firstChild);\n        h.appendChild(inner);\n        h._clipInner = inner;\n      }\n    }\n\n    // image mask wipe: clipPath inset(0 100% 0 0) -> 0, inner cover img scale 1.2 -> 1.0\n    const masks = Array.from(root.querySelectorAll('[data-mask]'));\n    if (!reduce) {\n      for (const m of masks) {\n        m.style.clipPath = 'inset(0 100% 0 0)';\n        m.style.webkitClipPath = 'inset(0 100% 0 0)';\n        m.style.transition = 'clip-path 1s ease-out, -webkit-clip-path 1s ease-out';\n        const img = m.querySelector('img');\n        if (img && getComputedStyle(img).objectFit === 'cover') {\n          img.style.transform = 'scale(1.2)';\n          img.style.transition = 'transform 1.1s ease-out';\n          img._maskScale = true;\n        }\n      }\n    }\n\n    // bars\n    const bars = Array.from(root.querySelectorAll('[data-bar]'));\n    for (const b of bars) { if (!reduce) b.style.transition = 'width 1.6s ' + EASE; b.style.width = '0%'; }\n\n    // counters\n    const animateCount = (el) => {\n      if (el._done) return; el._done = true;\n      const target = parseFloat(el.getAttribute('data-count')) || 0;\n      const dec = parseInt(el.getAttribute('data-decimals') || '0', 10);\n      const suf = el.getAttribute('data-suffix') || '';\n      const pre = el.getAttribute('data-prefix') || '';\n      const fmt = (v) => pre + (dec ? v.toFixed(dec).replace('.', ',') : Math.round(v).toString()) + suf;\n      if (reduce) { el.textContent = fmt(target); return; }\n      const dur = 1600, t0 = performance.now(), ease = (t) => 1 - Math.pow(1 - t, 3);\n      const step = (now) => { const p = Math.min(1, (now - t0) / dur); el.textContent = fmt(target * ease(p)); if (p < 1) requestAnimationFrame(step); };\n      requestAnimationFrame(step);\n    };\n\n    const fireReveal = (el) => {\n      if (el.hasAttribute('data-reveal') && el.getAttribute('data-rise') !== 'zoom') { el.style.opacity = '1'; el.style.transform = 'none'; }\n      if (el.hasAttribute('data-clip') && el._clipInner) { el._clipInner.style.transform = 'translateY(0)'; }\n      if (el.hasAttribute('data-mask')) {\n        el.style.clipPath = 'inset(0 0 0 0)';\n        el.style.webkitClipPath = 'inset(0 0 0 0)';\n        const img = el.querySelector('img');\n        if (img && img._maskScale) { img.style.transform = 'scale(1)'; setTimeout(() => { img.style.transition = ''; img.style.transform = ''; }, 1150); }\n      }\n      if (el.hasAttribute('data-count')) animateCount(el);\n      if (el.querySelectorAll) el.querySelectorAll('[data-count]').forEach(animateCount);\n      if (el.hasAttribute('data-bar')) el.style.width = (parseFloat(el.dataset.bar) || 0) + '%';\n      if (el.querySelectorAll) el.querySelectorAll('[data-bar]').forEach((b) => { b.style.width = (parseFloat(b.dataset.bar) || 0) + '%'; });\n    };\n\n    // ---- Single IntersectionObserver for one-shot reveals ----\n    const io = new IntersectionObserver((entries) => {\n      for (const en of entries) {\n        if (!en.isIntersecting) continue;\n        fireReveal(en.target);\n        io.unobserve(en.target);\n      }\n    }, { threshold: 0.16, rootMargin: '0px 0px -7% 0px' });\n    this._io = io;\n\n    reveals.forEach((el) => io.observe(el));\n    clips.forEach((el) => io.observe(el));\n    masks.forEach((el) => io.observe(el));\n    root.querySelectorAll('[data-count]').forEach((el) => { if (!el.closest('[data-reveal]')) io.observe(el); });\n    bars.forEach((el) => { if (!el.closest('[data-reveal]')) io.observe(el); });\n\n    if (reduce) {\n      reveals.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n      clips.forEach((el) => { if (el._clipInner) el._clipInner.style.transform = 'translateY(0)'; });\n      root.querySelectorAll('[data-count]').forEach(animateCount);\n      bars.forEach((b) => { b.style.width = (parseFloat(b.dataset.bar) || 0) + '%'; });\n    } else {\n      // reveal above-the-fold immediately so hero paints on load\n      requestAnimationFrame(() => {\n        const vh = window.innerHeight || 800;\n        const fire = (el) => {\n          const r = el.getBoundingClientRect();\n          if (r.top < vh * 0.95 && r.bottom > 0) { fireReveal(el); io.unobserve(el); }\n        };\n        reveals.forEach(fire); clips.forEach(fire); masks.forEach(fire);\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._io) this._io.disconnect();\n    if (this._rafStop) this._rafStop();\n    if (this._curCleanup) this._curCleanup();\n    if (this._mobileCleanup) this._mobileCleanup();\n    if (this._navCleanup) this._navCleanup();\n    if (this._meshCleanup) this._meshCleanup();\n  }\n}\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
